<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const DATA=JSON.parse(document.getElementById('model-data').textContent);
const root=document.getElementById('app');
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x07070a);
const camera=new THREE.PerspectiveCamera(60, innerWidth/innerHeight, .1, 3000);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); root.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.dampingFactor=.08;
scene.add(new THREE.AmbientLight(0xffffff,.75));
const dir=new THREE.DirectionalLight(0xffffff,.75); dir.position.set(40,70,30); scene.add(dir);
const fill=new THREE.DirectionalLight(0xadc6ff,.25); fill.position.set(-30,25,-40); scene.add(fill);
const texLoader=new THREE.TextureLoader();
function loadTex(url){const t=texLoader.load(url); t.colorSpace=THREE.SRGBColorSpace; t.magFilter=THREE.NearestFilter; t.minFilter=THREE.NearestFilter; t.generateMipmaps=false; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;}
const materials=[];
function needsAlpha(f){return f.includes('glass')||f.includes('lava')||f.includes('chain')||f.includes('bars')||f.includes('fence')||f.includes('trapdoor');}
for(const mat of DATA.materials){
  const alpha=needsAlpha(mat.family); materials.push(new THREE.MeshLambertMaterial({map:loadTex(mat.dataUrl), transparent:alpha, opacity:mat.family.includes('glass') ? .42 : 1, alphaTest:alpha?0.35:0, side:alpha?THREE.DoubleSide:THREE.FrontSide}));
}
// Special block textures come from the Minecraft jar, not fake procedural crops.
const special={};
for(const [k,u] of Object.entries(DATA.specialTextures||{})){ special[k]=loadTex(u); }
function texMat(key, alpha=false){return new THREE.MeshLambertMaterial({map:special[key],transparent:alpha,alphaTest:alpha?0.35:0,side:alpha?THREE.DoubleSide:THREE.FrontSide});}
const chestFrontMat=texMat('chestFront');
const chestSideMat=texMat('chestSide');
const chestTopMat=texMat('chestTop');
const lanternBodySideMat=texMat('lanternBodySide',true);
const lanternBodyTopMat=texMat('lanternBodyTop',true);
const lanternCapSideMat=texMat('lanternCapSide',true);
const lanternCapTopMat=texMat('lanternCapTop',true);
const metalMat=new THREE.MeshLambertMaterial({color:0x252932});
const hotMat=new THREE.MeshBasicMaterial({color:0xff3b3b,wireframe:false,transparent:true,opacity:.45});
const chestHotMat=new THREE.MeshBasicMaterial({color:0xffd24d,wireframe:false,transparent:true,opacity:.35});
const wireMat=new THREE.MeshBasicMaterial({color:0x000000,wireframe:true,transparent:true,opacity:.28});
const group=new THREE.Group(); scene.add(group);
const meshes=[]; const wires=[]; const overlays=[];
function geomFromCuboid(c,stretchUv=false){
  const x0=c[0]-.5,y0=c[1]-.5,z0=c[2]-.5,x1=c[3]-.5,y1=c[4]-.5,z1=c[5]-.5;
  const dx=c[3]-c[0],dy=c[4]-c[1],dz=c[5]-c[2];
  const pos=[], nor=[], uv=[], idx=[];
  function face(a,b,c_,d,n,w,h){
    const base=pos.length/3;
    pos.push(...a,...b,...c_,...d);
    nor.push(...n,...n,...n,...n);
    if(stretchUv) uv.push(0,0,1,0,1,1,0,1);
    else uv.push(0,0,w,0,w,h,0,h);
    idx.push(base,base+1,base+2,base,base+2,base+3);
  }
  face([x1,y0,z1],[x1,y0,z0],[x1,y1,z0],[x1,y1,z1],[1,0,0],dz,dy);
  face([x0,y0,z0],[x0,y0,z1],[x0,y1,z1],[x0,y1,z0],[-1,0,0],dz,dy);
  face([x0,y1,z1],[x1,y1,z1],[x1,y1,z0],[x0,y1,z0],[0,1,0],dx,dz);
  face([x0,y0,z0],[x1,y0,z0],[x1,y0,z1],[x0,y0,z1],[0,-1,0],dx,dz);
  face([x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1],[0,0,1],dx,dy);
  face([x1,y0,z0],[x0,y0,z0],[x0,y1,z0],[x1,y1,z0],[0,0,-1],dx,dy);
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  return g;
}
function registerMesh(mesh,b,overlayOk=true){
  mesh.userData={family:b.family,x:b.x,y:b.y,z:b.z,props:b.props||{}}; group.add(mesh); meshes.push(mesh);
  const w=new THREE.Mesh(mesh.geometry,wireMat); w.position.copy(mesh.position); w.rotation.copy(mesh.rotation); w.visible=false; group.add(w); wires.push(w);
  if(overlayOk&&(b.family.includes('blackstone')||b.family.includes('chest'))){const ov=new THREE.Mesh(mesh.geometry,b.family.includes('chest')?chestHotMat:hotMat); ov.position.copy(mesh.position); ov.rotation.copy(mesh.rotation); ov.userData=mesh.userData; ov.visible=false; group.add(ov); overlays.push(ov);}
  return mesh;
}
function addMesh(b,cub,mat,overlayOk=true,stretchUv=false){const mesh=new THREE.Mesh(geomFromCuboid(cub,stretchUv),mat); mesh.position.set(b.x-DATA.size[0]/2,b.y-DATA.size[1]/2,b.z-DATA.size[2]/2); return registerMesh(mesh,b,overlayOk);}
function addBox(b,cx,cy,cz,w,h,d,mat,overlayOk=true){const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); mesh.position.set(b.x-DATA.size[0]/2+cx-.5,b.y-DATA.size[1]/2+cy-.5,b.z-DATA.size[2]/2+cz-.5); return registerMesh(mesh,b,overlayOk);}
function addChest(b){
  const f=b.props?.facing||'north';
  const mats=[chestSideMat,chestSideMat,chestTopMat,chestSideMat,chestSideMat,chestSideMat]; // +x,-x,+y,-y,+z,-z
  if(f==='east') mats[0]=chestFrontMat; else if(f==='west') mats[1]=chestFrontMat; else if(f==='south') mats[4]=chestFrontMat; else mats[5]=chestFrontMat;
  addBox(b,.5,.4375,.5,.92,.875,.92,mats,true);
}
function addLantern(b){
  const body=[lanternBodySideMat,lanternBodySideMat,lanternBodyTopMat,lanternBodyTopMat,lanternBodySideMat,lanternBodySideMat];
  const cap=[lanternCapSideMat,lanternCapSideMat,lanternCapTopMat,lanternCapTopMat,lanternCapSideMat,lanternCapSideMat];
  addBox(b,.5,.21875,.5,6/16,7/16,6/16,body,false);
  addBox(b,.5,.50,.5,4/16,2/16,4/16,cap,false);
  // small dark handle/support, geometry only; main visible lantern pixels are vanilla texture crops above
  addBox(b,.5,.66,.5,2/16,5/16,2/16,metalMat,false);
}
for(const b of DATA.blocks){
  if(b.family.includes('lantern')){addLantern(b); continue;}
  if(b.family.includes('chest')){addChest(b); continue;}
  const shape=DATA.shapes[b.shape]; const mat=materials[b.mat];
  for(const cub of shape) addMesh(b,cub,mat,true,false);
}
const box=new THREE.Box3().setFromObject(group); const center=new THREE.Vector3(); box.getCenter(center); group.position.sub(center);
const size=new THREE.Vector3(); box.getSize(size); const maxDim=Math.max(size.x,size.y,size.z,12);
function setCam(kind){if(kind==='top') camera.position.set(0,maxDim*1.45,.01); else if(kind==='side') camera.position.set(maxDim*1.1,maxDim*.35,0); else if(kind==='player') camera.position.set(maxDim*.45,maxDim*.18,maxDim*.85); else camera.position.set(maxDim*.75,maxDim*.55,maxDim*.75); controls.target.set(0,0,0); controls.update();}
setCam('iso');
function applyFilters(){const hideRoof=document.getElementById('hideRoof').checked, hideFront=document.getElementById('hideFront').checked, chestOnly=document.getElementById('chestOnly').checked; const showWire=document.getElementById('showWire').checked; const hotBlack=document.getElementById('hotBlack').checked, hotChest=document.getElementById('hotChest').checked; for(let i=0;i<meshes.length;i++){const m=meshes[i], f=m.userData.family; let vis=true; if(hideRoof && m.userData.y>=DATA.size[1]-1) vis=false; if(hideFront && m.userData.z<=1) vis=false; if(chestOnly && !f.includes('chest')) vis=false; m.visible=vis; wires[i].visible=vis && showWire;} for(const ov of overlays){const f=ov.userData.family; ov.visible=meshes.some(m=>m.visible&&m.position.equals(ov.position)&&m.userData.family===f) && ((hotBlack&&f.includes('blackstone'))||(hotChest&&f.includes('chest')));}}
['hideRoof','hideFront','chestOnly','showWire','hotBlack','hotChest'].forEach(id=>document.getElementById(id).addEventListener('change',applyFilters));
document.getElementById('toggleUi').onclick=()=>document.getElementById('ui').classList.toggle('collapsed');
document.getElementById('btnIso').onclick=()=>setCam('iso'); document.getElementById('btnPlayer').onclick=()=>setCam('player'); document.getElementById('btnSide').onclick=()=>setCam('side'); document.getElementById('btnTop').onclick=()=>setCam('top'); document.getElementById('btnReset').onclick=()=>{group.rotation.set(0,0,0);setCam('iso')};
function stats(){let s=''; for(const [k,v] of Object.entries(DATA.stats.topMaterials)){s+=k+': '+v+'\n'} document.getElementById('stats').textContent=s;} stats(); applyFilters(); document.getElementById('loading').classList.add('hide');
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight)});
function animate(){requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera);} animate();
</script></body></html>
